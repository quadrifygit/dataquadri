<script>
(function(){
  const STORAGE_KEY="quadrify_rotulagem__rotulagem__sapiranga";
  const GEO_NAME="geo_json_c53dd262c78d2df9db1fbd47c03f4020";

  const COLORS={
    "BASE":      {fill:"#2ca25f", stroke:"#000000"},
    "POTENCIAL": {fill:"#3182bd", stroke:"#000000"},
    "NEUTRO":    {fill:"#000000", stroke:"#000000"},
    "RUIM":      {fill:"#d73027", stroke:"#000000"},
    "NONE":      {fill:"#ffffff", stroke:"#000000"}
  };

  function loadState(){
    try{ const raw=localStorage.getItem(STORAGE_KEY); return raw? (JSON.parse(raw)||{}) : {}; }
    catch(e){ return {}; }
  }
  function saveState(obj){
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(obj||{})); }catch(e){}
  }

  function styleForLabel(lbl){
    const c = COLORS[lbl] || COLORS["NONE"];
    if(lbl === "NONE"){
      return {fillColor:c.fill, color:"#000000", weight:2.6, fillOpacity:0.15, opacity:1.0};
    }
    return {fillColor:c.fill, color:"#000000", weight:2.8, fillOpacity:0.80, opacity:1.0};
  }

  function getByEval(name){ try{ return eval(name); }catch(e){ return null; } }

  function applyAll(GEO){
    const st = loadState();
    GEO.eachLayer((layer)=>{
      try{
        const props = (layer.feature && layer.feature.properties) ? layer.feature.properties : {};
        const fid = props && props._qid ? String(props._qid) : null;
        const lbl = (fid && st[fid]) ? st[fid] : "NONE";
        layer.setStyle(styleForLabel(lbl));
      }catch(e){}
    });
  }

  function popupHtml(fid, props, atual){
    const rua = (props && props._rua) ? props._rua : "—";
    const mun = (props && props._mun) ? props._mun : "—";
    const cur = atual && atual !== "NONE" ? atual : "—";

    return `
      <div class="qrfy-popup">
        <div class="qrfy-title">Setor: ${fid}</div>
        <div class="qrfy-sub">
          <b>Rua:</b> ${rua}<br/>
          <b>Município:</b> ${mun}<br/>
          <b>Atual:</b> ${cur}
        </div>

        <div class="qrfy-row">
          <button class="qrfy-btn" style="background:#2ca25f" data-act="BASE" data-fid="${fid}">BASE</button>
          <button class="qrfy-btn" style="background:#3182bd" data-act="POTENCIAL" data-fid="${fid}">POTENCIAL</button>
          <button class="qrfy-btn" style="background:#000000" data-act="NEUTRO" data-fid="${fid}">NEUTRO</button>
          <button class="qrfy-btn" style="background:#d73027" data-act="RUIM" data-fid="${fid}">RUIM</button>
          <button class="qrfy-btn" style="background:rgba(0,0,0,.45)" data-act="NONE" data-fid="${fid}">REMOVER</button>
        </div>

        <div class="qrfy-mini">Clique em uma opção para salvar.</div>
      </div>
    `;
  }

  function boot(){
    const GEO = getByEval(GEO_NAME);
    if(!GEO){ setTimeout(boot, 200); return; }

    applyAll(GEO);

    GEO.eachLayer((layer)=>{
      layer.on("mouseover", ()=>{
        try{ layer.setStyle({weight: 3.4}); }catch(e){}
      });

      layer.on("mouseout", ()=>{
        try{
          const props = (layer.feature && layer.feature.properties) ? layer.feature.properties : {};
          const fid = props && props._qid ? String(props._qid) : null;
          const st = loadState();
          const lbl = (fid && st[fid]) ? st[fid] : "NONE";
          layer.setStyle(styleForLabel(lbl));
        }catch(e){}
      });

      layer.on("click", (e)=>{
        try{
          const props = (layer.feature && layer.feature.properties) ? layer.feature.properties : {};
          const fid = props && props._qid ? String(props._qid) : null;
          if(!fid) return;

          const st = loadState();
          const atual = (st[fid] ? st[fid] : "NONE");

          const html = popupHtml(fid, props, atual);
          layer.bindPopup(html, {maxWidth: 340}).openPopup();

          setTimeout(()=>{
            const el = document.querySelector(".leaflet-popup-content");
            if(!el) return;

            el.querySelectorAll("button[data-act][data-fid]").forEach((btn)=>{
              btn.onclick = ()=>{
                const act = btn.getAttribute("data-act");
                const fid2 = btn.getAttribute("data-fid");
                if(!fid2) return;

                const st2 = loadState();
                if(act === "NONE") delete st2[fid2];
                else st2[fid2] = act;
                saveState(st2);

                layer.setStyle(styleForLabel(act));

                try{ layer.closePopup(); }catch(e){}
              };
            });
          }, 30);

        }catch(err){}
      });
    });
  }

  boot();
})();
</script>
